<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archives — Radio Fleurs de Dieu</title>
<meta name="description" content="Retrouvez les prières, témoignages et bulletins de nouvelles de Radio Fleurs de Dieu.">
<style>
  :root {
    --vert-fonce: #1f5c3d;
    --vert-fonce2: #2e7d52;
    --or: #c79a4b;
    --creme: #f6f3ea;
    --texte: #33403a;
    --texte-clair: #6b6b62;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--creme);
    color: var(--texte);
  }
  a { color: inherit; text-decoration: none; }
  h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; font-weight: 500; }

  header {
    background: var(--vert-fonce);
    color: white;
    padding: 14px 20px;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo-link { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; }
  .logo-link img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
  nav { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; font-size: 0.95rem; }
  nav a:hover { color: var(--or); }
  .live-badge {
    background: #b23b3b;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .hero {
    background: var(--vert-fonce2);
    color: white;
    text-align: center;
    padding: 40px 20px 30px;
  }
  .hero h1 { margin: 0 0 8px; font-size: 1.8rem; }
  .hero p { margin: 0; opacity: 0.85; }

  .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px 60px; }

  .filters {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .filters-label {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--texte-clair);
    margin-bottom: 8px;
  }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .pills:last-child { margin-bottom: 0; }
  .pill {
    border: 1px solid #ddd6c5;
    background: var(--creme);
    color: var(--texte);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--or); }
  .pill.active {
    background: var(--vert-fonce);
    color: white;
    border-color: var(--vert-fonce);
  }
  .date-input {
    border: 1px solid #ddd6c5;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.85rem;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 18px;
    border-left: 5px solid var(--or);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    width: fit-content;
    padding: 4px 10px;
    border-radius: 20px;
    color: white;
  }
  .card h3 { margin: 0; font-size: 1.05rem; line-height: 1.3; }
  .card .card-date { font-size: 0.8rem; color: var(--texte-clair); }
  .card blockquote {
    margin: 0;
    padding: 8px 12px;
    border-left: 3px solid var(--or);
    background: var(--creme);
    font-style: italic;
    font-size: 0.88rem;
    color: var(--texte-clair);
  }
  .card p.extrait { margin: 0; font-size: 0.92rem; line-height: 1.5; color: var(--texte); }
  .card audio { width: 100%; margin-top: 4px; }

  .empty, .loading {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--texte-clair);
    padding: 40px 20px;
  }

  footer {
    background: var(--vert-fonce);
    color: rgba(255,255,255,0.8);
    text-align: center;
    padding: 24px 20px;
    font-size: 0.85rem;
  }
  footer a { color: var(--or); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo-link">
      <img src="logo.jpeg" alt="Logo Radio Fleurs de Dieu">
      <span>Radio Fleurs de Dieu</span>
    </a>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="don.html">Faire un don</a>
    </nav>
  </div>
</header>

<section class="hero">
  <h1>Archive des Émissions</h1>
  <p>Prières, témoignages et bulletins de nouvelles des derniers jours</p>
</section>

<main class="container">
  <div class="filters">
    <div class="filters-label">Sélectionner une date</div>
    <div class="pills" id="datePills"></div>
    <div class="filters-label">Catégorie</div>
    <div class="pills" id="categoryPills"></div>
  </div>

  <div id="cardsGrid" class="cards-grid">
    <p class="loading">Chargement des archives...</p>
  </div>
</main>

<footer>
  <p>Radio Fleurs de Dieu (RFDD) · « Une proximité avec Dieu dans l'évangélisation »</p>
  <p><a href="index.html">← Retour à l'accueil</a></p>
</footer>

<script>
const CATEGORIES = {
  priere_matin: { label: "Prière Matin", icon: "🌅", color: "#c8802b" },
  priere_soir:  { label: "Prière Soir",  icon: "🌙", color: "#5b4b8a" },
  temoignage:   { label: "Témoignage",   icon: "❤️", color: "#b3495f" },
  nouvelles:    { label: "Nouvelles",    icon: "📰", color: "#3a6ea5" },
};

const MOIS_FR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const JOURS_FR = ["dim.","lun.","mar.","mer.","jeu.","ven.","sam."];

function formatDateLongue(iso) {
  const d = new Date(iso + "T12:00:00");
  return `${d.getDate()} ${MOIS_FR[d.getMonth()]} ${d.getFullYear()}`;
}
function formatDatePill(iso) {
  const d = new Date(iso + "T12:00:00");
  const todayIso = new Date().toISOString().slice(0, 10);
  if (iso === todayIso) return "Aujourd'hui";
  return `${JOURS_FR[d.getDay()]} ${d.getDate()} ${MOIS_FR[d.getMonth()].slice(0,4)}.`;
}

let TOUTES_ENTREES = [];
let dateSelectionnee = null;
let categorieSelectionnee = "tout";

async function charger() {
  const grid = document.getElementById("cardsGrid");
  try {
    const reponse = await fetch("data/index.json", { cache: "no-store" });
    if (!reponse.ok) throw new Error("data/index.json introuvable");
    TOUTES_ENTREES = await reponse.json();
  } catch (e) {
    grid.innerHTML = `<p class="empty">Aucune archive disponible pour l'instant. Revenez bientôt !</p>`;
    document.getElementById("datePills").innerHTML = "";
    document.getElementById("categoryPills").innerHTML = "";
    return;
  }

  if (!TOUTES_ENTREES.length) {
    grid.innerHTML = `<p class="empty">Aucune archive disponible pour l'instant. Revenez bientôt !</p>`;
    return;
  }

  TOUTES_ENTREES.sort((a, b) => b.date.localeCompare(a.date));
  dateSelectionnee = TOUTES_ENTREES[0].date;

  construireFiltres();
  rendre();
}

function construireFiltres() {
  const dates = [...new Set(TOUTES_ENTREES.map(e => e.date))].sort((a, b) => b.localeCompare(a));
  const datePillsEl = document.getElementById("datePills");
  datePillsEl.innerHTML = "";

  const btnToutes = document.createElement("button");
  btnToutes.className = "pill" + (dateSelectionnee === null ? " active" : "");
  btnToutes.textContent = "Toutes les dates";
  btnToutes.onclick = () => { dateSelectionnee = null; construireFiltres(); rendre(); };
  datePillsEl.appendChild(btnToutes);

  dates.slice(0, 7).forEach(iso => {
    const btn = document.createElement("button");
    btn.className = "pill" + (dateSelectionnee === iso ? " active" : "");
    btn.textContent = formatDatePill(iso);
    btn.onclick = () => { dateSelectionnee = iso; construireFiltres(); rendre(); };
    datePillsEl.appendChild(btn);
  });

  if (dates.length > 7) {
    const input = document.createElement("input");
    input.type = "date";
    input.className = "date-input";
    input.max = dates[0];
    input.min = dates[dates.length - 1];
    input.onchange = () => { dateSelectionnee = input.value; construireFiltres(); rendre(); };
    datePillsEl.appendChild(input);
  }

  const catPillsEl = document.getElementById("categoryPills");
  catPillsEl.innerHTML = "";
  const categoriesPresentes = [...new Set(TOUTES_ENTREES.map(e => e.categorie))];

  const btnTout = document.createElement("button");
  btnTout.className = "pill" + (categorieSelectionnee === "tout" ? " active" : "");
  btnTout.textContent = "Tout";
  btnTout.onclick = () => { categorieSelectionnee = "tout"; construireFiltres(); rendre(); };
  catPillsEl.appendChild(btnTout);

  categoriesPresentes.forEach(cat => {
    const meta = CATEGORIES[cat] || { label: cat, icon: "🔹" };
    const btn = document.createElement("button");
    btn.className = "pill" + (categorieSelectionnee === cat ? " active" : "");
    btn.textContent = `${meta.icon} ${meta.label}`;
    btn.onclick = () => { categorieSelectionnee = cat; construireFiltres(); rendre(); };
    catPillsEl.appendChild(btn);
  });
}

function rendre() {
  const grid = document.getElementById("cardsGrid");
  let entrees = TOUTES_ENTREES;
  if (dateSelectionnee !== null) entrees = entrees.filter(e => e.date === dateSelectionnee);
  if (categorieSelectionnee !== "tout") entrees = entrees.filter(e => e.categorie === categorieSelectionnee);

  if (!entrees.length) {
    grid.innerHTML = `<p class="empty">Aucune émission pour cette sélection.</p>`;
    return;
  }

  grid.innerHTML = "";
  entrees.forEach(entree => {
    const meta = CATEGORIES[entree.categorie] || { label: entree.categorie, icon: "🔹", color: "#888" };
    const card = document.createElement("div");
    card.className = "card";
    card.style.borderLeftColor = meta.color;

    const versetHtml = entree.verset
      ? `<blockquote>${entree.verset}</blockquote>`
      : "";

    card.innerHTML = `
      <span class="card-badge" style="background:${meta.color}">${meta.icon} ${meta.label}</span>
      <h3>${entree.titre}</h3>
      <div class="card-date">${formatDateLongue(entree.date)}</div>
      ${versetHtml}
      <p class="extrait">${entree.extrait}</p>
      <audio controls preload="none" src="${entree.audio}"></audio>
    `;
    grid.appendChild(card);
  });
}

charger();
</script>

</body>
</html>
